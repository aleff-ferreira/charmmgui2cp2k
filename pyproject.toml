[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
markers = [
    "unit: fast unit tests of the scientific core",
    "regression: golden-output regression tests",
    "tui: Textual TUI interaction tests",
    "integration: end-to-end / launcher tests",
    "requires_cp2k: needs a CP2K binary available on PATH",
]

[tool.coverage.run]
source = ["charmmgui2cp2k"]
branch = true

[tool.coverage.report]
show_missing = true
skip_covered = false
# Floor that the CI-runnable suite (unit + regression + golden, no external
# CP2K/Amber/big-system deps) clears with headroom (~25% as of Phase 2).
# Ratchets up in later phases as coverage of the emitter and CLI/TUI grows;
# the long-term target is >= 85% on the scientific core.
fail_under = 20
